<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Poso · Tres ideas cada mañana</title>
<meta name="description" content="Tres ideas cada mañana para que se vayan posando en ti.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F8FAFC">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Poso">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  :root {
    --bg: #F8FAFC;
    --bg-grad-top: #FDFEFF;
    --bg-grad-bottom: #E9F1F8;
    --card: #FFFFFF;
    --ink: #2B3440;
    --ink-soft: #8895A3;
    --accent: #4E97CD;
    --accent-soft: #C5DDF0;
    --shadow: 0 8px 30px rgba(70, 100, 130, 0.10);
    --radius: 22px;
    --serif: ui-serif, "New York", Georgia, "Times New Roman", serif;
    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; }

  body {
    font-family: var(--sans);
    color: var(--ink);
    background: linear-gradient(180deg, var(--bg-grad-top) 0%, var(--bg-grad-bottom) 100%);
    background-attachment: fixed;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Layout ---------- */
  .screen {
    display: none;
    max-width: 560px;
    margin: 0 auto;
    padding: calc(env(safe-area-inset-top) + 28px) 22px calc(env(safe-area-inset-bottom) + 110px);
    animation: screenIn .35s ease both;
  }
  .screen.active { display: block; }

  @keyframes screenIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Cabecera Hoy ---------- */
  .sun {
    width: 44px; height: 44px;
    margin-bottom: 14px;
    animation: sunRise 1.2s cubic-bezier(.2,.8,.3,1) both;
  }
  @keyframes sunRise {
    from { opacity: 0; transform: translateY(14px) scale(.8); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .greeting {
    font-family: var(--serif);
    font-size: 30px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .date {
    margin-top: 5px;
    font-size: 14px;
    color: var(--ink-soft);
    letter-spacing: 0.4px;
    text-transform: capitalize;
  }
  .intro {
    margin-top: 14px;
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.5;
  }

  /* ---------- Tarjetas de ideas ---------- */
  .cards { margin-top: 30px; display: flex; flex-direction: column; gap: 18px; }

  .idea-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 26px 24px 24px;
    box-shadow: var(--shadow);
    position: relative;
    opacity: 0;
    animation: cardIn .6s cubic-bezier(.2,.8,.3,1) forwards;
  }
  .idea-card:nth-child(1) { animation-delay: .15s; }
  .idea-card:nth-child(2) { animation-delay: .35s; }
  .idea-card:nth-child(3) { animation-delay: .55s; }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .idea-num {
    font-family: var(--serif);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 2.5px;
    margin-bottom: 12px;
  }
  .idea-text {
    font-family: var(--serif);
    font-size: 21px;
    line-height: 1.45;
    font-weight: 450;
  }

  /* ---------- Estado vacío ---------- */
  .empty {
    margin-top: 60px;
    text-align: center;
    padding: 0 10px;
  }
  .empty .glyph { font-size: 44px; margin-bottom: 18px; }
  .empty h2 {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 10px;
  }
  .empty p {
    font-size: 15px;
    color: var(--ink-soft);
    line-height: 1.55;
    margin-bottom: 26px;
  }
  .btn-primary {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    border: none;
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 600;
    padding: 15px 30px;
    border-radius: 100px;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(78, 151, 205, 0.35);
    transition: transform .15s ease;
  }
  .btn-primary:active { transform: scale(.96); }

  /* ---------- Mis ideas ---------- */
  .page-title {
    font-family: var(--serif);
    font-size: 30px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .page-sub {
    margin-top: 5px;
    font-size: 14px;
    color: var(--ink-soft);
  }

  .composer {
    margin-top: 24px;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px;
  }
  .composer textarea {
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    font-family: var(--serif);
    font-size: 18px;
    line-height: 1.45;
    color: var(--ink);
    background: transparent;
    min-height: 56px;
  }
  .composer textarea::placeholder { color: #B4C2CF; }
  .composer-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 8px;
  }
  .btn-add {
    background: var(--accent);
    color: #fff;
    border: none;
    font-size: 15px;
    font-weight: 600;
    padding: 10px 22px;
    border-radius: 100px;
    cursor: pointer;
    transition: transform .15s ease, opacity .15s ease;
  }
  .btn-add:disabled { opacity: .35; }
  .btn-add:active { transform: scale(.95); }

  .idea-list { margin-top: 28px; display: flex; flex-direction: column; gap: 12px; }

  .idea-row {
    background: var(--card);
    border-radius: 18px;
    padding: 18px 20px;
    box-shadow: 0 3px 14px rgba(70, 100, 130, 0.07);
    animation: rowIn .3s ease both;
  }
  @keyframes rowIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .idea-row-text {
    font-family: var(--serif);
    font-size: 17px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .idea-row-actions {
    display: none;
    gap: 10px;
    margin-top: 14px;
  }
  .idea-row.open .idea-row-actions { display: flex; }
  .chip {
    border: 1.5px solid #D8E3ED;
    background: transparent;
    color: var(--ink-soft);
    font-size: 13.5px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 100px;
    cursor: pointer;
  }
  .chip.danger { color: #B5483A; border-color: #EDD6D2; }

  .idea-row textarea.edit-area {
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    font-family: var(--serif);
    font-size: 17px;
    line-height: 1.45;
    color: var(--ink);
    background: #F2F6FA;
    border-radius: 12px;
    padding: 12px;
  }

  .list-footer {
    margin-top: 30px;
    text-align: center;
    font-size: 13px;
    color: var(--ink-soft);
  }
  .list-footer button {
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 13px;
    text-decoration: underline;
    text-underline-offset: 3px;
    cursor: pointer;
    padding: 6px;
  }

  /* ---------- Tab bar ---------- */
  .tabbar {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom) + 18px);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 100px;
    padding: 6px;
    box-shadow: 0 10px 35px rgba(70, 100, 130, 0.18);
    z-index: 10;
  }
  .tab {
    border: none;
    background: transparent;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    color: var(--ink-soft);
    padding: 12px 26px;
    border-radius: 100px;
    cursor: pointer;
    transition: background .2s ease, color .2s ease;
  }
  .tab.active {
    background: var(--accent);
    color: #fff;
  }

  /* ---------- Toast ---------- */
  .toast {
    position: fixed;
    top: calc(env(safe-area-inset-top) + 16px);
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--ink);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    padding: 12px 22px;
    border-radius: 100px;
    z-index: 20;
    transition: transform .35s cubic-bezier(.2,.8,.3,1);
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ============ PANTALLA HOY ============ -->
<main id="screen-today" class="screen active">
  <svg class="sun" viewBox="0 0 44 44" fill="none">
    <circle cx="22" cy="26" r="10" fill="#7FB6E0"/>
    <g stroke="#7FB6E0" stroke-width="2.4" stroke-linecap="round">
      <line x1="22" y1="6" x2="22" y2="11"/>
      <line x1="8" y1="12" x2="11.5" y2="15.5"/>
      <line x1="36" y1="12" x2="32.5" y2="15.5"/>
      <line x1="4" y1="26" x2="9" y2="26"/>
      <line x1="35" y1="26" x2="40" y2="26"/>
    </g>
    <line x1="2" y1="38" x2="42" y2="38" stroke="#AECBE3" stroke-width="2.4" stroke-linecap="round"/>
  </svg>
  <h1 class="greeting" id="greeting">Buenos días</h1>
  <p class="date" id="today-date"></p>
  <div id="today-content"></div>
</main>

<!-- ============ PANTALLA MIS IDEAS ============ -->
<main id="screen-ideas" class="screen">
  <h1 class="page-title">Mis ideas</h1>
  <p class="page-sub" id="ideas-count"></p>

  <div class="composer">
    <textarea id="new-idea" rows="2" placeholder="Escribe una idea que quieras que se pose en ti…"></textarea>
    <div class="composer-actions">
      <button class="btn-add" id="btn-add" disabled>Guardar</button>
    </div>
  </div>

  <div class="idea-list" id="idea-list"></div>

  <div class="list-footer" id="list-footer" style="display:none">
    <button id="btn-export">Exportar</button> ·
    <button id="btn-import">Importar</button>
  </div>
</main>

<!-- ============ TAB BAR ============ -->
<nav class="tabbar">
  <button class="tab active" data-screen="today">Hoy</button>
  <button class="tab" data-screen="ideas">Mis ideas</button>
</nav>

<div class="toast" id="toast"></div>

<script>
/* =========================================================
   POSO · Tres ideas cada mañana
   Datos en localStorage:
   - poso.ideas : [{id, text, createdAt, lastShown, shownCount}]
   - poso.today : {date: 'YYYY-MM-DD', ids: [id, id, id]}
   ========================================================= */

const LS_IDEAS = 'poso.ideas';
const LS_TODAY = 'poso.today';
const DAILY_COUNT = 3;
const ROMANS = ['I', 'II', 'III'];

/* ---------- Datos ---------- */
function loadIdeas() {
  try { return JSON.parse(localStorage.getItem(LS_IDEAS)) || []; }
  catch { return []; }
}
function saveIdeas(ideas) {
  localStorage.setItem(LS_IDEAS, JSON.stringify(ideas));
}
function todayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

/* ---------- Selección diaria con rotación inteligente ----------
   Prioriza las ideas que hace más tiempo que no se muestran
   (las nunca mostradas van primero). Empates se resuelven al azar.
   La selección queda fijada para todo el día. */
function getTodaySelection() {
  const ideas = loadIdeas();
  if (ideas.length === 0) return [];

  let today = null;
  try { today = JSON.parse(localStorage.getItem(LS_TODAY)); } catch {}

  if (today && today.date === todayKey()) {
    const byId = Object.fromEntries(ideas.map(i => [i.id, i]));
    const selected = today.ids.map(id => byId[id]).filter(Boolean);
    if (selected.length === Math.min(DAILY_COUNT, ideas.length)) return selected;
    // Si borraron/añadieron ideas y la selección quedó coja, se completa
  }

  const pool = [...ideas].sort((a, b) => {
    const la = a.lastShown || 0, lb = b.lastShown || 0;
    if (la !== lb) return la - lb;
    return Math.random() - 0.5;
  });
  const selected = pool.slice(0, DAILY_COUNT);

  const now = Date.now();
  selected.forEach(sel => {
    const idea = ideas.find(i => i.id === sel.id);
    if (idea) { idea.lastShown = now; idea.shownCount = (idea.shownCount || 0) + 1; }
  });
  saveIdeas(ideas);
  localStorage.setItem(LS_TODAY, JSON.stringify({ date: todayKey(), ids: selected.map(i => i.id) }));
  return selected;
}

/* ---------- Pantalla Hoy ---------- */
function renderToday() {
  const greeting = document.getElementById('greeting');
  const hour = new Date().getHours();
  greeting.textContent = hour < 13 ? 'Buenos días' : (hour < 21 ? 'Buenas tardes' : 'Buenas noches');

  const dateEl = document.getElementById('today-date');
  dateEl.textContent = new Date().toLocaleDateString('es-ES', {
    weekday: 'long', day: 'numeric', month: 'long'
  });

  const content = document.getElementById('today-content');
  const selection = getTodaySelection();

  if (selection.length === 0) {
    content.innerHTML = `
      <div class="empty">
        <div class="glyph">🌱</div>
        <h2>Aún no hay nada posándose</h2>
        <p>Cuando una conversación, un libro o una experiencia te deje una idea que quieras incorporar en ti, guárdala aquí.</p>
        <button class="btn-primary" onclick="switchScreen('ideas');document.getElementById('new-idea').focus()">Añadir mi primera idea</button>
      </div>`;
    return;
  }

  let html = '<p class="intro">Tus ideas de hoy. Léelas despacio, deja que se posen.</p><div class="cards">';
  selection.forEach((idea, i) => {
    html += `
      <article class="idea-card">
        <div class="idea-num">${ROMANS[i]}</div>
        <p class="idea-text">${escapeHtml(idea.text)}</p>
      </article>`;
  });
  html += '</div>';
  content.innerHTML = html;
}

/* ---------- Pantalla Mis ideas ---------- */
function renderIdeas() {
  const ideas = loadIdeas();
  const count = document.getElementById('ideas-count');
  count.textContent = ideas.length === 0
    ? 'Tu colección está vacía, de momento.'
    : ideas.length === 1
      ? '1 idea posándose en ti.'
      : ideas.length + ' ideas posándose en ti.';

  const list = document.getElementById('idea-list');
  list.innerHTML = '';
  [...ideas].reverse().forEach(idea => {
    const row = document.createElement('div');
    row.className = 'idea-row';
    row.dataset.id = idea.id;
    row.innerHTML = `
      <p class="idea-row-text">${escapeHtml(idea.text)}</p>
      <div class="idea-row-actions">
        <button class="chip" data-action="edit">Editar</button>
        <button class="chip danger" data-action="delete">Borrar</button>
      </div>`;
    row.querySelector('.idea-row-text').addEventListener('click', () => {
      document.querySelectorAll('.idea-row.open').forEach(r => { if (r !== row) r.classList.remove('open'); });
      row.classList.toggle('open');
    });
    row.querySelector('[data-action="delete"]').addEventListener('click', () => deleteIdea(idea.id));
    row.querySelector('[data-action="edit"]').addEventListener('click', () => editIdea(row, idea.id));
    list.appendChild(row);
  });

  document.getElementById('list-footer').style.display = ideas.length > 0 ? 'block' : 'none';
}

function addIdea() {
  const ta = document.getElementById('new-idea');
  const text = ta.value.trim();
  if (!text) return;
  const ideas = loadIdeas();
  ideas.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
    text,
    createdAt: Date.now(),
    lastShown: null,
    shownCount: 0
  });
  saveIdeas(ideas);
  ta.value = '';
  ta.style.height = 'auto';
  document.getElementById('btn-add').disabled = true;
  renderIdeas();
  showToast('Idea guardada ✨');
}

function deleteIdea(id) {
  if (!confirm('¿Borrar esta idea?')) return;
  saveIdeas(loadIdeas().filter(i => i.id !== id));
  renderIdeas();
}

function editIdea(row, id) {
  const ideas = loadIdeas();
  const idea = ideas.find(i => i.id === id);
  if (!idea) return;
  const textEl = row.querySelector('.idea-row-text');
  const ta = document.createElement('textarea');
  ta.className = 'edit-area';
  ta.value = idea.text;
  textEl.replaceWith(ta);
  autosize(ta);
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);

  const actions = row.querySelector('.idea-row-actions');
  actions.innerHTML = '<button class="chip" data-action="save">Guardar</button><button class="chip" data-action="cancel">Cancelar</button>';
  actions.querySelector('[data-action="save"]').addEventListener('click', () => {
    const newText = ta.value.trim();
    if (newText) { idea.text = newText; saveIdeas(ideas); }
    renderIdeas();
    showToast('Idea actualizada');
  });
  actions.querySelector('[data-action="cancel"]').addEventListener('click', renderIdeas);
}

/* ---------- Exportar / Importar ---------- */
function exportIdeas() {
  const text = loadIdeas().map(i => i.text).join('\n\n');
  if (navigator.share) {
    navigator.share({ title: 'Mis ideas de Poso', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => showToast('Ideas copiadas al portapapeles'));
  }
}

function importIdeas() {
  const pasted = prompt('Pega tus ideas (una por línea o separadas por línea en blanco):');
  if (!pasted) return;
  const chunks = pasted.includes('\n\n')
    ? pasted.split(/\n\s*\n/)
    : pasted.split('\n');
  const ideas = loadIdeas();
  let added = 0;
  chunks.map(c => c.trim()).filter(Boolean).forEach(text => {
    if (ideas.some(i => i.text === text)) return;
    ideas.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
      text, createdAt: Date.now(), lastShown: null, shownCount: 0
    });
    added++;
  });
  saveIdeas(ideas);
  renderIdeas();
  showToast(added + (added === 1 ? ' idea importada' : ' ideas importadas'));
}

/* ---------- Navegación ---------- */
function switchScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.screen === name));
  if (name === 'today') renderToday();
  if (name === 'ideas') renderIdeas();
  window.scrollTo({ top: 0 });
}

/* ---------- Utilidades ---------- */
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function autosize(ta) {
  const resize = () => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; };
  ta.addEventListener('input', resize);
  resize();
}
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ---------- Init ---------- */
document.querySelectorAll('.tab').forEach(t =>
  t.addEventListener('click', () => switchScreen(t.dataset.screen))
);

const newIdeaTa = document.getElementById('new-idea');
autosize(newIdeaTa);
newIdeaTa.addEventListener('input', () => {
  document.getElementById('btn-add').disabled = !newIdeaTa.value.trim();
});
document.getElementById('btn-add').addEventListener('click', addIdea);
document.getElementById('btn-export').addEventListener('click', exportIdeas);
document.getElementById('btn-import').addEventListener('click', importIdeas);

// Si la app queda abierta de un día para otro, refresca al volver
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && document.getElementById('screen-today').classList.contains('active')) {
    renderToday();
  }
});

renderToday();

// PWA: funciona sin conexión
if ('serviceWorker' in navigator && location.protocol === 'https:') {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>

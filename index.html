<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Poso · Tres ideas cada mañana</title>
<meta name="description" content="Tres ideas cada mañana para que se vayan posando en ti.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F8FAFC">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Poso">
<link rel="apple-touch-icon" href="icon-180.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #F8FAFC;
    --bg-grad-top: #FDFEFF;
    --bg-grad-bottom: #E9F1F8;
    --card: #FFFFFF;
    --ink: #2B3440;
    --ink-soft: #8895A3;
    --accent: #4E97CD;
    --accent-soft: #C5DDF0;
    --shadow: 0 8px 30px rgba(70, 100, 130, 0.10);
    --radius: 22px;
    --serif: ui-serif, "New York", Georgia, "Times New Roman", serif;
    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; }

  body {
    font-family: var(--sans);
    color: var(--ink);
    background: linear-gradient(180deg, var(--bg-grad-top) 0%, var(--bg-grad-bottom) 100%);
    background-attachment: fixed;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Layout ---------- */
  .screen {
    display: none;
    max-width: 560px;
    margin: 0 auto;
    padding: calc(env(safe-area-inset-top) + 28px) 22px calc(env(safe-area-inset-bottom) + 110px);
    animation: screenIn .35s ease both;
  }
  .screen.active { display: block; }

  @keyframes screenIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Cabecera Hoy ---------- */
  .sun {
    width: 44px; height: 44px;
    margin-bottom: 14px;
    animation: sunRise 1.2s cubic-bezier(.2,.8,.3,1) both;
  }
  @keyframes sunRise {
    from { opacity: 0; transform: translateY(14px) scale(.8); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .greeting {
    font-family: var(--serif);
    font-size: 30px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .date {
    margin-top: 5px;
    font-size: 14px;
    color: var(--ink-soft);
    letter-spacing: 0.4px;
    text-transform: capitalize;
  }
  .intro {
    margin-top: 14px;
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.5;
  }

  /* ---------- Tarjetas de ideas ---------- */
  .cards { margin-top: 30px; display: flex; flex-direction: column; gap: 18px; }

  .idea-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 26px 24px 24px;
    box-shadow: var(--shadow);
    position: relative;
    opacity: 0;
    animation: cardIn .6s cubic-bezier(.2,.8,.3,1) forwards;
  }
  .idea-card:nth-child(1) { animation-delay: .15s; }
  .idea-card:nth-child(2) { animation-delay: .35s; }
  .idea-card:nth-child(3) { animation-delay: .55s; }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .idea-num {
    font-family: var(--serif);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 2.5px;
    margin-bottom: 12px;
  }
  .idea-text {
    font-family: var(--serif);
    font-size: 21px;
    line-height: 1.45;
    font-weight: 450;
  }

  /* ---------- Estado vacío / cargando ---------- */
  .empty {
    margin-top: 60px;
    text-align: center;
    padding: 0 10px;
  }
  .empty .glyph { font-size: 44px; margin-bottom: 18px; }
  .empty h2 {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 10px;
  }
  .empty p {
    font-size: 15px;
    color: var(--ink-soft);
    line-height: 1.55;
    margin-bottom: 26px;
  }
  .btn-primary {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    border: none;
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 600;
    padding: 15px 30px;
    border-radius: 100px;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(78, 151, 205, 0.35);
    transition: transform .15s ease, opacity .15s ease;
  }
  .btn-primary:active { transform: scale(.96); }
  .btn-primary:disabled { opacity: .45; }

  .loading {
    margin-top: 70px;
    text-align: center;
    color: var(--ink-soft);
    font-size: 14px;
  }
  .loading::before {
    content: '';
    display: block;
    width: 26px; height: 26px;
    margin: 0 auto 14px;
    border-radius: 50%;
    border: 3px solid var(--accent-soft);
    border-top-color: var(--accent);
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- Login ---------- */
  .login-wrap {
    margin-top: 8vh;
    text-align: center;
  }
  .login-wrap .sun { margin: 0 auto 18px; width: 54px; height: 54px; }
  .login-title {
    font-family: var(--serif);
    font-size: 32px;
    font-weight: 600;
  }
  .login-sub {
    margin-top: 10px;
    font-size: 15px;
    color: var(--ink-soft);
    line-height: 1.55;
    max-width: 320px;
    margin-left: auto;
    margin-right: auto;
  }
  .login-card {
    margin: 30px auto 0;
    max-width: 360px;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px 20px;
    text-align: left;
  }
  .login-card label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    margin-bottom: 8px;
    letter-spacing: .3px;
  }
  .login-card input {
    width: 100%;
    border: 1.5px solid #D8E3ED;
    border-radius: 14px;
    padding: 14px 16px;
    font-family: var(--sans);
    font-size: 17px;
    color: var(--ink);
    outline: none;
    background: #FBFDFE;
  }
  .login-card input:focus { border-color: var(--accent); }
  .login-card input.code {
    text-align: center;
    font-size: 26px;
    letter-spacing: 8px;
    font-variant-numeric: tabular-nums;
  }
  .login-card .btn-primary { width: 100%; margin-top: 16px; }
  .login-hint {
    margin-top: 14px;
    font-size: 13px;
    color: var(--ink-soft);
    text-align: center;
    line-height: 1.5;
  }
  .login-hint button {
    background: none; border: none;
    color: var(--accent);
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  /* ---------- Mis ideas ---------- */
  .page-title {
    font-family: var(--serif);
    font-size: 30px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .page-sub {
    margin-top: 5px;
    font-size: 14px;
    color: var(--ink-soft);
  }

  .composer {
    margin-top: 24px;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px;
  }
  .composer textarea {
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    font-family: var(--serif);
    font-size: 18px;
    line-height: 1.45;
    color: var(--ink);
    background: transparent;
    min-height: 56px;
  }
  .composer textarea::placeholder { color: #B4C2CF; }
  .composer-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 8px;
  }
  .btn-add {
    background: var(--accent);
    color: #fff;
    border: none;
    font-size: 15px;
    font-weight: 600;
    padding: 10px 22px;
    border-radius: 100px;
    cursor: pointer;
    transition: transform .15s ease, opacity .15s ease;
  }
  .btn-add:disabled { opacity: .35; }
  .btn-add:active { transform: scale(.95); }

  .idea-list { margin-top: 28px; display: flex; flex-direction: column; gap: 12px; }

  .idea-row {
    background: var(--card);
    border-radius: 18px;
    padding: 18px 20px;
    box-shadow: 0 3px 14px rgba(70, 100, 130, 0.07);
    animation: rowIn .3s ease both;
  }
  @keyframes rowIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .idea-row-text {
    font-family: var(--serif);
    font-size: 17px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .idea-row-actions {
    display: none;
    gap: 10px;
    margin-top: 14px;
  }
  .idea-row.open .idea-row-actions { display: flex; }
  .chip {
    border: 1.5px solid #D8E3ED;
    background: transparent;
    color: var(--ink-soft);
    font-size: 13.5px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 100px;
    cursor: pointer;
  }
  .chip.danger { color: #B5483A; border-color: #EDD6D2; }

  .idea-row textarea.edit-area {
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    font-family: var(--serif);
    font-size: 17px;
    line-height: 1.45;
    color: var(--ink);
    background: #F2F6FA;
    border-radius: 12px;
    padding: 12px;
  }

  .list-footer {
    margin-top: 30px;
    text-align: center;
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 2;
  }
  .list-footer button {
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 13px;
    text-decoration: underline;
    text-underline-offset: 3px;
    cursor: pointer;
    padding: 6px;
  }

  /* ---------- Tab bar ---------- */
  .tabbar {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom) + 18px);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 100px;
    padding: 6px;
    box-shadow: 0 10px 35px rgba(70, 100, 130, 0.18);
    z-index: 10;
  }
  body.logged-out .tabbar { display: none; }
  .tab {
    border: none;
    background: transparent;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    color: var(--ink-soft);
    padding: 12px 26px;
    border-radius: 100px;
    cursor: pointer;
    transition: background .2s ease, color .2s ease;
  }
  .tab.active {
    background: var(--accent);
    color: #fff;
  }

  /* ---------- Toast ---------- */
  .toast {
    position: fixed;
    top: calc(env(safe-area-inset-top) + 16px);
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--ink);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    padding: 12px 22px;
    border-radius: 100px;
    z-index: 20;
    transition: transform .35s cubic-bezier(.2,.8,.3,1);
    pointer-events: none;
    white-space: nowrap;
    max-width: 90vw;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>

      <g stroke="#7FB6E0" stroke-width="2.4" stroke-linecap="round">

<div class="toast" id="toast"></div>

<script>
/* =========================================================
   POSO · Tres ideas cada mañana — con Supabase
   - Nube: tablas poso_ideas y poso_daily_picks (RLS por usuario)
   - Login sin contraseña: código de un solo uso por email
   - Offline: última copia en localStorage como respaldo de lectura
   ========================================================= */

const SUPABASE_URL = 'https://ffknejjagedfykrvmhgl.supabase.co';
const SUPABASE_KEY = 'sb_publishable_gQ2OmFKkam2QAiVlgLlr1Q_WzhUWCBY';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const DAILY_COUNT = 3;
const ROMANS = ['I', 'II', 'III'];
const CACHE_IDEAS = 'poso.cache.ideas';
const CACHE_TODAY = 'poso.cache.today';

const state = { ideas: [], offline: false, pendingEmail: null };

/* ---------- Utilidades ---------- */
function todayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function autosize(ta) {
  const resize = () => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; };
  ta.addEventListener('input', resize);
  resize();
}
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}
function saveCache() {
  localStorage.setItem(CACHE_IDEAS, JSON.stringify(state.ideas));
}
function loadCache() {
  try { return JSON.parse(localStorage.getItem(CACHE_IDEAS)) || []; } catch { return []; }
}
function saveTodayCache(ids) {
  localStorage.setItem(CACHE_TODAY, JSON.stringify({ date: todayKey(), ids }));
}
function loadTodayCache() {
  try { return JSON.parse(localStorage.getItem(CACHE_TODAY)); } catch { return null; }
}

/* ---------- Navegación ---------- */
function switchScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.screen === name));
  if (name === 'today') renderToday();
  if (name === 'ideas') renderIdeas();
  window.scrollTo({ top: 0 });
}

/* ---------- Login ---------- */
function showLogin() {
  document.body.classList.add('logged-out');
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-login').classList.add('active');
}

async function sendCode() {
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  if (!email || !email.includes('@')) { showToast('Escribe un email válido'); return; }
  const btn = document.getElementById('btn-send-code');
  btn.disabled = true; btn.textContent = 'Enviando…';
  const { error } = await db.auth.signInWithOtp({ email });
  btn.disabled = false; btn.textContent = 'Enviarme el código';
  if (error) { showToast('No se pudo enviar: ' + error.message); return; }
  state.pendingEmail = email;
  document.getElementById('login-step-email').style.display = 'none';
  document.getElementById('login-step-code').style.display = 'block';
  document.getElementById('login-code').focus();
  showToast('Código enviado a ' + email);
}

async function verifyCode() {
  const token = document.getElementById('login-code').value.trim();
  if (token.length < 6) { showToast('El código tiene al menos 6 dígitos'); return; }
  const btn = document.getElementById('btn-verify-code');
  btn.disabled = true; btn.textContent = 'Comprobando…';
  const { error } = await db.auth.verifyOtp({ email: state.pendingEmail, token, type: 'email' });
  btn.disabled = false; btn.textContent = 'Entrar';
  if (error) { showToast('Código incorrecto o caducado'); return; }
  await enterApp();
}

async function logout() {
  if (!confirm('¿Cerrar sesión en este dispositivo?')) return;
  await db.auth.signOut();
  localStorage.removeItem(CACHE_IDEAS);
  localStorage.removeItem(CACHE_TODAY);
  state.ideas = [];
  document.getElementById('login-step-email').style.display = 'block';
  document.getElementById('login-step-code').style.display = 'none';
  showLogin();
}

/* ---------- Datos en la nube ---------- */
async function loadIdeasCloud() {
  const { data, error } = await db.from('poso_ideas').select('*').order('created_at', { ascending: true });
  if (error) {
    state.offline = true;
    state.ideas = loadCache();
    return;
  }
  state.offline = false;
  state.ideas = data;
  saveCache();
}

/* Migra a la nube las ideas guardadas en local por la versión anterior */
async function migrateLegacyIdeas() {
  let legacy = [];
  try { legacy = JSON.parse(localStorage.getItem('poso.ideas')) || []; } catch {}
  if (!legacy.length || state.offline) return;
  const existing = new Set(state.ideas.map(i => i.text));
  const rows = legacy.map(l => l.text && l.text.trim()).filter(t => t && !existing.has(t)).map(text => ({ text }));
  if (rows.length) {
    const { data, error } = await db.from('poso_ideas').insert(rows).select();
    if (error) return; // se reintenta en la próxima apertura
    state.ideas.push(...data);
    saveCache();
    showToast(rows.length + (rows.length === 1 ? ' idea migrada a la nube' : ' ideas migradas a la nube'));
  }
  localStorage.removeItem('poso.ideas');
  localStorage.removeItem('poso.today');
}

/* ---------- Selección diaria con rotación inteligente ----------
   Prioriza lo que hace más tiempo que no se muestra (lo nunca
   mostrado va primero). La selección del día se guarda en la nube,
   así todos los dispositivos ven las mismas 3 ideas. */
function computeSelection(ideas) {
  return [...ideas].sort((a, b) => {
    const la = a.last_shown ? Date.parse(a.last_shown) : 0;
    const lb = b.last_shown ? Date.parse(b.last_shown) : 0;
    if (la !== lb) return la - lb;
    return Math.random() - 0.5;
  }).slice(0, DAILY_COUNT);
}

async function getTodaySelection() {
  if (!state.ideas.length) return [];
  const day = todayKey();

  if (!state.offline) {
    const { data, error } = await db.from('poso_daily_picks')
      .select('idea_ids').eq('day', day).maybeSingle();

    if (!error) {
      if (data) {
        const byId = Object.fromEntries(state.ideas.map(i => [i.id, i]));
        const sel = data.idea_ids.map(id => byId[id]).filter(Boolean);
        if (sel.length) { saveTodayCache(sel.map(i => i.id)); return sel; }
      }
      // No hay selección para hoy: se crea y se fija en la nube
      const sel = computeSelection(state.ideas);
      const now = new Date().toISOString();
      await Promise.all(sel.map(i =>
        db.from('poso_ideas')
          .update({ last_shown: now, shown_count: (i.shown_count || 0) + 1 })
          .eq('id', i.id)
      ));
      sel.forEach(i => { i.last_shown = now; i.shown_count = (i.shown_count || 0) + 1; });
      await db.from('poso_daily_picks').upsert({ day, idea_ids: sel.map(i => i.id) });
      saveCache();
      saveTodayCache(sel.map(i => i.id));
      return sel;
    }
    state.offline = true;
  }

  // Sin conexión: última selección cacheada de hoy, o una temporal
  const cached = loadTodayCache();
  if (cached && cached.date === day) {
    const byId = Object.fromEntries(state.ideas.map(i => [i.id, i]));
    const sel = cached.ids.map(id => byId[id]).filter(Boolean);
    if (sel.length) return sel;
  }
  return computeSelection(state.ideas);
}

/* ---------- Pantalla Hoy ---------- */
async function renderToday() {
  const greeting = document.getElementById('greeting');
  const hour = new Date().getHours();
  greeting.textContent = hour < 13 ? 'Buenos días' : (hour < 21 ? 'Buenas tardes' : 'Buenas noches');

  document.getElementById('today-date').textContent =
    new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });

  const content = document.getElementById('today-content');

  if (state.ideas.length === 0) {
    content.innerHTML = `
      <div class="empty">
        <div class="glyph">🌱</div>
        <h2>Aún no hay nada posándose</h2>
        <p>Cuando una conversación, un libro o una experiencia te deje una idea que quieras incorporar en ti, guárdala aquí.</p>
        <button class="btn-primary" onclick="switchScreen('ideas');document.getElementById('new-idea').focus()">Añadir mi primera idea</button>
      </div>`;
    return;
  }

  content.innerHTML = '<div class="loading">Preparando tus ideas de hoy…</div>';
  const selection = await getTodaySelection();

  let html = '<p class="intro">Tus ideas de hoy. Léelas despacio, deja que se posen.</p>';
  if (state.offline) html = '<p class="intro">Sin conexión — mostrando tu última copia. ' + html.slice(17);
  html += '<div class="cards">';
  selection.forEach((idea, i) => {
    html += `
      <article class="idea-card">
        <div class="idea-num">${ROMANS[i]}</div>
        <p class="idea-text">${escapeHtml(idea.text)}</p>
      </article>`;
  });
  html += '</div>';
  content.innerHTML = html;
}

/* ---------- Pantalla Mis ideas ---------- */
function renderIdeas() {
  const ideas = state.ideas;
  const count = document.getElementById('ideas-count');
  count.textContent = ideas.length === 0
    ? 'Tu colección está vacía, de momento.'
    : ideas.length === 1
      ? '1 idea posándose en ti.'
      : ideas.length + ' ideas posándose en ti.';

  const list = document.getElementById('idea-list');
  list.innerHTML = '';
  [...ideas].reverse().forEach(idea => {
    const row = document.createElement('div');
    row.className = 'idea-row';
    row.dataset.id = idea.id;
    row.innerHTML = `
      <p class="idea-row-text">${escapeHtml(idea.text)}</p>
      <div class="idea-row-actions">
        <button class="chip" data-action="edit">Editar</button>
        <button class="chip danger" data-action="delete">Borrar</button>
      </div>`;
    row.querySelector('.idea-row-text').addEventListener('click', () => {
      document.querySelectorAll('.idea-row.open').forEach(r => { if (r !== row) r.classList.remove('open'); });
      row.classList.toggle('open');
    });
    row.querySelector('[data-action="delete"]').addEventListener('click', () => deleteIdea(idea.id));
    row.querySelector('[data-action="edit"]').addEventListener('click', () => editIdea(row, idea.id));
    list.appendChild(row);
  });

  document.getElementById('footer-tools').style.display = ideas.length > 0 ? 'inline' : 'none';
}

async function addIdea() {
  const ta = document.getElementById('new-idea');
  const text = ta.value.trim();
  if (!text) return;
  const btn = document.getElementById('btn-add');
  btn.disabled = true;
  const { data, error } = await db.from('poso_ideas').insert({ text }).select().single();
  if (error) {
    btn.disabled = false;
    showToast('Sin conexión: no se pudo guardar');
    return;
  }
  state.ideas.push(data);
  saveCache();
  ta.value = '';
  ta.style.height = 'auto';
  renderIdeas();
  showToast('Idea guardada ✨');
}

async function deleteIdea(id) {
  if (!confirm('¿Borrar esta idea?')) return;
  const { error } = await db.from('poso_ideas').delete().eq('id', id);
  if (error) { showToast('Sin conexión: no se pudo borrar'); return; }
  state.ideas = state.ideas.filter(i => i.id !== id);
  saveCache();
  renderIdeas();
}

function editIdea(row, id) {
  const idea = state.ideas.find(i => i.id === id);
  if (!idea) return;
  const textEl = row.querySelector('.idea-row-text');
  const ta = document.createElement('textarea');
  ta.className = 'edit-area';
  ta.value = idea.text;
  textEl.replaceWith(ta);
  autosize(ta);
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);

  const actions = row.querySelector('.idea-row-actions');
  actions.innerHTML = '<button class="chip" data-action="save">Guardar</button><button class="chip" data-action="cancel">Cancelar</button>';
  actions.querySelector('[data-action="save"]').addEventListener('click', async () => {
    const newText = ta.value.trim();
    if (newText && newText !== idea.text) {
      const { error } = await db.from('poso_ideas').update({ text: newText }).eq('id', id);
      if (error) { showToast('Sin conexión: no se pudo guardar'); return; }
      idea.text = newText;
      saveCache();
      showToast('Idea actualizada');
    }
    renderIdeas();
  });
  actions.querySelector('[data-action="cancel"]').addEventListener('click', renderIdeas);
}

/* ---------- Exportar / Importar ---------- */
function exportIdeas() {
  const text = state.ideas.map(i => i.text).join('\n\n');
  if (navigator.share) {
    navigator.share({ title: 'Mis ideas de Poso', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => showToast('Ideas copiadas al portapapeles'));
  }
}

async function importIdeas() {
  const pasted = prompt('Pega tus ideas (una por línea o separadas por línea en blanco):');
  if (!pasted) return;
  const chunks = pasted.includes('\n\n') ? pasted.split(/\n\s*\n/) : pasted.split('\n');
  const existing = new Set(state.ideas.map(i => i.text));
  const rows = chunks.map(c => c.trim()).filter(t => t && !existing.has(t)).map(text => ({ text }));
  if (!rows.length) { showToast('Nada nuevo que importar'); return; }
  const { data, error } = await db.from('poso_ideas').insert(rows).select();
  if (error) { showToast('Sin conexión: no se pudo importar'); return; }
  state.ideas.push(...data);
  saveCache();
  renderIdeas();
  showToast(data.length + (data.length === 1 ? ' idea importada' : ' ideas importadas'));
}

/* ---------- Arranque ---------- */
async function enterApp() {
  document.body.classList.remove('logged-out');
  const { data: { user } } = await db.auth.getUser();
  document.getElementById('footer-email').textContent = user && user.email ? user.email : '';
  await loadIdeasCloud();
  await migrateLegacyIdeas();
  switchScreen('today');
}

async function init() {
  const { data: { session } } = await db.auth.getSession();
  if (session) { await enterApp(); } else { showLogin(); }
}

db.auth.onAuthStateChange((event) => {
  if (event === 'SIGNED_OUT') showLogin();
});

document.querySelectorAll('.tab').forEach(t =>
  t.addEventListener('click', () => switchScreen(t.dataset.screen))
);

const newIdeaTa = document.getElementById('new-idea');
autosize(newIdeaTa);
newIdeaTa.addEventListener('input', () => {
  document.getElementById('btn-add').disabled = !newIdeaTa.value.trim();
});
document.getElementById('btn-add').addEventListener('click', addIdea);
document.getElementById('btn-export').addEventListener('click', exportIdeas);
document.getElementById('btn-import').addEventListener('click', importIdeas);
document.getElementById('btn-logout').addEventListener('click', logout);
document.getElementById('btn-send-code').addEventListener('click', sendCode);
document.getElementById('btn-verify-code').addEventListener('click', verifyCode);
document.getElementById('btn-resend').addEventListener('click', sendCode);
document.getElementById('login-email').addEventListener('keydown', e => { if (e.key === 'Enter') sendCode(); });
document.getElementById('login-code').addEventListener('keydown', e => { if (e.key === 'Enter') verifyCode(); });
document.getElementById('login-code').addEventListener('input', e => {
  const len = e.target.value.trim().length;
  if (len === 6 || len === 8) verifyCode();
});

// Si la app queda abierta de un día para otro, refresca al volver
document.addEventListener('visibilitychange', async () => {
  if (!document.hidden && document.getElementById('screen-today').classList.contains('active') && !document.body.classList.contains('logged-out')) {
    await loadIdeasCloud();
    renderToday();
  }
});

init();

// PWA: funciona sin conexión
if ('serviceWorker' in navigator && location.protocol === 'https:') {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
